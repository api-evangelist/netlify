apis:
  - aid: netlify:netlify-api
    name: Netlify API
    description: >-
      Netlify is a hosting service for the programmable web. It understands
      your documents and provides an API to handle atomic deploys of websites,
      manage form submissions, inject JavaScript snippets, and much more. This
      is a REST-style API that uses JSON for serialization and OAuth 2 for
      authentication.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.netlify.com/api-and-cli-guides/api-guides/get-started-with-api/
