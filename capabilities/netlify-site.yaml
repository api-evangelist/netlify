naftiko: 1.0.0-alpha2
info:
  label: Netlify Netlify's API documentation — Site
  description: 'Netlify Netlify''s API documentation — Site. 8 operations. Lead operation: Site. Self-contained Naftiko capability
    covering one Netlify business surface.'
  tags:
  - Netlify
  - Site
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETLIFY_API_KEY: NETLIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: netlify-site
    baseUri: https://api.netlify.com/api/v1
    description: Netlify Netlify's API documentation — Site business capability. Self-contained, no shared references.
    resources:
    - name: sites
      path: /sites
      operations:
      - name: listsites
        method: GET
        description: '**Note:** Environment variable keys and values have moved from `build_settings.env` and `repo.env` to
          a new endpoint. Please use [getEnvVars](#tag/environmentVariables/operation/getEnvVars) to retrieve site environment
          variables.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
        - name: filter
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
      - name: createsite
        method: POST
        description: '**Note:** Environment variable keys and values have moved from `build_settings.env` and `repo.env` to
          a new endpoint. Please use [createEnvVars](#tag/environmentVariables/operation/createEnvVars) to create environment
          variables for a site.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: configure_dns
          in: query
          type: boolean
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-site_id
      path: /sites/{site_id}
      operations:
      - name: getsite
        method: GET
        description: '**Note:** Environment variable keys and values have moved from `build_settings.env` and `repo.env` to
          a new endpoint. Please use [getEnvVars](#tag/environmentVariables/operation/getEnvVars) to retrieve site environment
          variables.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
        - name: feature_flags
          in: query
          type: string
      - name: deletesite
        method: DELETE
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
      - name: updatesite
        method: PATCH
        description: '**Note:** Environment variable keys and values have moved from `build_settings.env` and `repo.env` to
          a new endpoint. Please use [updateEnvVar](#tag/environmentVariables/operation/updateEnvVar) to update a site''s
          environment variables.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-site_id-unlink_repo
      path: /sites/{site_id}/unlink_repo
      operations:
      - name: unlinksiterepo
        method: PUT
        description: '[Beta] Unlinks the repo from the site.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
    - name: account_slug-sites
      path: /{account_slug}/sites
      operations:
      - name: listsitesforaccount
