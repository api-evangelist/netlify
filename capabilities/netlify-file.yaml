    resources:
    - name: deploys-deploy_id-files-path
      path: /deploys/{deploy_id}/files/{path}
      operations:
      - name: uploaddeployfile
        method: PUT
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deploy_id
          in: path
          type: string
          required: true
        - name: path
          in: path
          type: string
          required: true
        - name: size
          in: query
          type: integer
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-site_id-files
      path: /sites/{site_id}/files
      operations:
      - name: listsitefiles
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
    - name: sites-site_id-files-file_path
