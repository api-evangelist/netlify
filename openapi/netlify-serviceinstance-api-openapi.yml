openapi: 3.0.1
info:
  title: Netlify Netlify's API documentation accessToken serviceInstance API
  description: 'Netlify is a hosting service for the programmable web. It understands your documents and provides an API to handle atomic deploys of websites, manage form submissions, inject JavaScript snippets, and much more. This is a REST-style API that uses JSON for serialization and OAuth 2 for authentication.


    This document is an OpenAPI reference for the Netlify API that you can explore. For more detailed instructions for common uses, please visit the [online documentation](https://www.netlify.com/docs/api/). Visit our Community forum to join the conversation about [understanding and using Netlify’s API](https://community.netlify.com/t/common-issue-understanding-and-using-netlifys-api/160).


    Additionally, we have two API clients for your convenience:

    - [Go Client](https://github.com/netlify/open-api#go-client)

    - [JS Client](https://github.com/netlify/build/tree/main/packages/js-client)'
  termsOfService: https://www.netlify.com/legal/terms-of-use/
  version: 2.33.1
  x-logo:
    url: netlify-logo.png
    href: https://www.netlify.com/docs/
    altText: Netlify
servers:
- url: https://api.netlify.com/api/v1
security:
- netlifyAuth: []
tags:
- name: serviceInstance
  x-displayName: Service instance
paths:
  /sites/{site_id}/service-instances:
    get:
      tags:
      - serviceInstance
      operationId: listServiceInstancesForSite
      parameters:
      - name: site_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/serviceInstance'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
  /sites/{site_id}/services/{addon}/instances:
    post:
      tags:
      - serviceInstance
      operationId: createServiceInstance
      parameters:
      - name: site_id
        in: path
        required: true
        schema:
          type: string
      - name: addon
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serviceInstance'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      x-codegen-request-body-name: config
  /sites/{site_id}/services/{addon}/instances/{instance_id}:
    get:
      tags:
      - serviceInstance
      operationId: showServiceInstance
      parameters:
      - name: site_id
        in: path
        required: true
        schema:
          type: string
      - name: addon
        in: path
        required: true
        schema:
          type: string
      - name: instance_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serviceInstance'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
    put:
      tags:
      - serviceInstance
      operationId: updateServiceInstance
      parameters:
      - name: site_id
        in: path
        required: true
        schema:
          type: string
      - name: addon
        in: path
        required: true
        schema:
          type: string
      - name: instance_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '204':
          description: No Content
          content: {}
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      x-codegen-request-body-name: config
    delete:
      tags:
      - serviceInstance
      operationId: deleteServiceInstance
      parameters:
      - name: site_id
        in: path
        required: true
        schema:
          type: string
      - name: addon
        in: path
        required: true
        schema:
          type: string
      - name: instance_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
          content: {}
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
components:
  schemas:
    serviceInstance:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        config:
          type: object
          properties: {}
        external_attributes:
          type: object
          properties: {}
        service_slug:
          type: string
        service_path:
          type: string
        service_name:
          type: string
        env:
          type: object
          properties: {}
        snippets:
          type: array
          items:
            type: object
            properties: {}
        auth_url:
          type: string
        created_at:
          type: string
          format: dateTime
        updated_at:
          type: string
          format: dateTime
    error:
      required:
      - message
      type: object
      properties:
        code:
          type: integer
          format: int64
        message:
          type: string
          nullable: false
  securitySchemes:
    netlifyAuth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://app.netlify.com/authorize
          scopes: {}
externalDocs:
  description: Online documentation
  url: https://www.netlify.com/docs/api/
